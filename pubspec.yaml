name: raisaver
description: "A Flutter app for downloading YouTube, Tiktok, and Instagram videos or images or music."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 2.1.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  dio: ^5.9.1
  google_fonts: ^8.0.2
  open_filex: ^4.7.0
  flutter_speed_dial: ^7.0.0
  file_picker: ^10.3.10
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/avatar.jpg


